<style>
:root {
  --bg:#f3f4f6;--card:#fff;--text:#111827;--sub:#6b7280;--accent:#047857;
}
body.dark {
  --bg:#0f172a;--card:#1e293b;--text:#e5e7eb;--sub:#9ca3af;--accent:#34d399;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
.container{max-width:420px;margin:auto;padding:16px}

.top{
display:flex;
justify-content:space-between;
align-items:center
}

.toggle{
border:none;
background:var(--card);
padding:6px 10px;
border-radius:10px;
cursor:pointer
}

.btnHoy{
border:none;
background:var(--accent);
color:white;
padding:6px 12px;
border-radius:10px;
font-weight:600;
cursor:pointer
}

.card{margin-top:20px;background:var(--card);border-radius:18px;padding:20px}
.day{font-size:18px;font-weight:600;color:var(--accent)}
.section{margin-top:14px;padding-top:10px;border-top:1px solid #e5e7eb}
.row{display:flex;justify-content:space-between;margin:6px 0}

.aviso{display:none;font-size:13px;color:var(--sub)}

.dia-item{
padding:8px 6px;
border-radius:10px;
cursor:pointer;
background:rgba(0,0,0,0.05);
font-size:14px;
text-align:center
}

body.dark .dia-item{
background:rgba(255,255,255,0.08)
}

.dia-hoy{
background:var(--accent);
color:white;
font-weight:600
}

#listaDias{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:8px
}

/* ANIMACION */
.fade{
animation:fade .5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

const modoBtn = document.getElementById("modoBtn");

const fecha = document.getElementById("fecha");
const tardeSection = document.getElementById("tardeSection");
const listaDias = document.getElementById("listaDias");

if("Notification" in window){
Notification.requestPermission();
}

function notificarCambioDia(){
if(Notification.permission==="granted"){
new Notification("📅 Nuevo día",{body:"El programa ha cambiado al día de hoy"});
}
}

function obtenerClaveActual(){
const hoy = new Date();
const año = hoy.getFullYear();
const mes = String(hoy.getMonth()+1).padStart(2,"0");
const dia = String(hoy.getDate()).padStart(2,"0");
return `${año}-${mes}-${dia}`;
}

let diaActualGuardado = obtenerClaveActual();

function revisarCambioDeDia(){
const nuevoDia = obtenerClaveActual();

if(nuevoDia !== diaActualGuardado){

diaActualGuardado = nuevoDia;

actualizarPrograma();
cargarListaDias();
notificarCambioDia();

}
}

function actualizarPrograma(){
mostrarDia(obtenerClaveActual());
}

function mostrarDia(c){
const d=programaMes[c];

if(!d){
document.getElementById("fecha").textContent = "No hay programa para este día";
return;
}
const p=c.split("-");
const f=new Date(p[0],p[1]-1,p[2]);

const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

fecha.textContent=`${dias[f.getDay()]} ${f.getDate()} de ${meses[f.getMonth()]} ${f.getFullYear()}`;

["mh","me","mt","md","mn","th","te","tt","td","tn"].forEach(id=>document.getElementById(id).textContent="—");

if(d.manana){
Object.values(d.manana).forEach((v,i)=>document.getElementById(["mh","me","mt","md","mn"][i]).textContent=v);
}

if(d.tarde){
tardeSection.style.display="block";
Object.values(d.tarde).forEach((v,i)=>document.getElementById(["th","te","tt","td","tn"][i]).textContent=v);
}else{
tardeSection.style.display="none";
}

const card=document.getElementById("programaDia");
card.classList.remove("fade");
setTimeout(()=>{card.classList.add("fade")},10);

}

function cargarListaDias(){

listaDias.innerHTML="";

const hoy=obtenerClaveActual();
const diaNum=parseInt(hoy.split("-")[2]);

const claves=Object.keys(programaMes).sort();

const visibles=diaNum<=15?claves.slice(0,15):claves.slice(15);

visibles.forEach(c=>{

const d=document.createElement("div");
d.className="dia-item";

if(c===hoy){
d.classList.add("dia-hoy");
}

d.textContent=c.split("-")[2];

d.onclick=()=>mostrarDia(c);

listaDias.appendChild(d);

});

}

actualizarPrograma();
cargarListaDias();

setInterval(()=>{
revisarCambioDeDia();
},60000);

if(localStorage.getItem("modo")==="dark"){
document.body.classList.add("dark");
}

modoBtn.textContent=document.body.classList.contains("dark")?"🌞":"🌙";

function toggleMode(){
document.body.classList.toggle("dark");
localStorage.setItem("modo",document.body.classList.contains("dark")?"dark":"light");
modoBtn.textContent=document.body.classList.contains("dark")?"🌞":"🌙";
}

</script>
